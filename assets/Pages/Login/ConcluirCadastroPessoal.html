<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/CSS/Style.CSS">
    <link rel="stylesheet" href="./assets/CSS/Navbar.CSS">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Cadastro Pessoal</title>

    <link rel="stylesheet" href="../../Components/HeaderLogado/Header.css">

    <link rel="stylesheet" href="../../Components/CampoForm/CampoForm.css">

    <link rel="stylesheet" href="../../Components/Calendario/Calendario.css">

    <script type="module">
        import { MeuHeader } from '../../Components/HeaderLogado/Header.js';
    </script>

    <script type="module">
        import { CampoSelect } from '../../Components/CampoForm/CampoSelect.js';
    </script>

    <script type="module">
        import { CampoForm } from '../../Components/CampoForm/CampoForm.js';
    </script>
</head>

<body>
    <meu-header></meu-header>

    <main class="container my-5">
        <p style="font-weight: bold; font-size: 2.5rem;">Conclua seu cadastro</p>

        <div style="display: flex; justify-content: space-between; gap: 40px; margin-top: 50px;">
            <div style="width: 100%; display: flex; flex-direction: column; gap: 20px">
                <campo-select titulo-form="Gênero" id-campo="genero" legenda="..." opcoes="Masculino, Feminino, Outro">
                </campo-select>

                <campo-form id-campo="input-cep" titulo-form="CEP" tipo="text" legenda="Informe seu CEP">
                </campo-form>

                <campo-form id-campo="input-logradouro" titulo-form="Logradouro" tipo="text" legenda="">
                </campo-form>

                <campo-form id-campo="input-estado" titulo-form="Estado" tipo="text" legenda="Informe o estado">
                </campo-form>

            </div>
            <div style="width: 100%; display: flex; flex-direction: column; gap: 20px">
                <campo-form id-campo="input-tel-recado" titulo-form="Telefone de Recado" tipo="tel" legenda="">
                </campo-form>

                <campo-form id-campo="input-numero-endereco" titulo-form="Número" tipo="text" legenda="">
                </campo-form>

                <campo-form id-campo="input-complemento" titulo-form="Complemento" tipo="text" legenda="Casa/Apt/Bloco">
                </campo-form>

                <campo-form id-campo="input-cidade" titulo-form="Cidade" tipo="text" legenda="Informe a cidade">
                </campo-form>


            </div>
        </div>

        <campo-form id-campo="input-pesquisa-empresa" titulo-form="Empresa" tipo="text" legenda="Digite sua empresa">
        </campo-form>

        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 50px;">
            <a href="../../../Index.html"><button class="btn btn-primary rounded-pill fw-bold py-2"
                    style="background-color: #92C444; border: none;">
                    Concluir
                </button></a>
        </div>
    </main>
</body>

</html>

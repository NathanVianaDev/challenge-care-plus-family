<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/CSS/Style.CSS">
    <link rel="stylesheet" href="./assets/CSS/Navbar.CSS">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Fila de Espera</title>

    <link rel="stylesheet" href="../../Components/HeaderLogado/Header.css">

    <link rel="stylesheet" href="../../Components/CampoForm/CampoForm.css">
    
    <link rel="stylesheet" href="../../Components/CampoForm/CampoData.css">

    <script type="module">
        import { MeuHeader } from '../../Components/HeaderLogado/Header.js';
    </script>

    <script type="module">
        import { CampoSelect } from '../../Components/CampoForm/CampoSelect.js';
    </script>

    <script type="module">
        import { CampoData } from '../../Components/CampoForm/CampoData.js';
    </script>

    <script type="module">
        import { CampoDataCustom } from '../../Components/CampoForm/CampoData.js';
    </script>

</head>

<body>
    <meu-header></meu-header>

    <main class="container my-5">
        <p style="font-weight: bold; font-size: 2.5rem;">Fila de Espera</p>

        <div style="display: flex; justify-content: space-between; gap: 40px; margin-top: 50px;">
            <div style="width: 100%; display: flex; flex-direction: column; gap: 20px">
                <campo-select titulo-form="Escolha uma especialidade:" id-campo="especialidade" legenda="..."
                    opcoes="Dermatologia, Odontologia">
                </campo-select>
                <campo-select titulo-form="Escolha o profissional:" id-campo="especialista" legenda="..."
                    opcoes="Dr. Bruno da Cunha, Dr. Bruno Zamboni, Dr. Cleuber Pacheco, Dr. Fernando Soares, Dr. Nathan Viana">
                </campo-select>
                <campo-select titulo-form="Escolha a unidade:" id-campo="unidade" legenda="..."
                    opcoes="Unidade Alphaville - Barueri, Unidade Brooklin - São Paulo, Unidade Campo Belo - São Paulo, Unidade Morumbi - São Paulo, Unidade Paulista - São Paulo, Unidade Rio Sul - Rio de Janeiro">
                </campo-select>

            </div>
            
            <div style="width: 100%; display: flex; flex-direction: column; gap: 20px">
            <campo-data titulo-form-data="Período de interesse" id-campo-data="data-exame">
                </campo-data>

            <campo-select titulo-form="Período do dia" id-campo="periodo-dia" legenda="..."
                    opcoes="Manhã, Tarde">
                </campo-select>

            <campo-select titulo-form="Antecedência mínima" id-campo="antecedencia-min" legenda="..."
                    opcoes="15 minutos, 30 minutos, 45 minutos">
                </campo-select>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 50px;">
            <a href="#"><button class="btn btn-primary rounded-pill fw-bold py-2"
                    style="background-color: #92C444; border: none;">
                    Confirmar Fila
                </button></a>
        </div>

    </main>
</body>

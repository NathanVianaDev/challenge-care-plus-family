<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking | Care Plus</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- css da classe nav -->
    <link rel="stylesheet" href="/assets/CSS/Navbar.CSS">
    
    <!-- css do restante da pagina -->
    <link rel="stylesheet" href="/assets/CSS/ranking.css">
</head>
<body class="bg-light">

    <!-- Inicio da navbar -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNavAltMarkup">
                <div class="navbar-nav align-items-center gap-5"> 
                    <a class="navbar-brand m-0" href="#"> 
                        <img src="/assets/Images/logo-care-plus.png" alt="Logo Care Plus" height="80">
                    </a>
                    <a class="nav-link text-dark" href="#">INÍCIO</a>
                    <a class="nav-link text-dark" href="#">AGENDAMENTOS</a>
                    <a class="nav-link text-dark" href="#">GAME PLUS +</a>
                    <a class="nav-link text-dark" href="#">UNIDADES</a>
                    <a class="nav-link text-dark" href="#">CONTATO</a>
                    
                    <a class="btn-perfil-sair" href="login.html" style="text-decoration: none;">
                        <span class="texto-sair">SAIR</span>
                        <div class="circulo-azul">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" style="width: 25px;">
                                <path fill="white" d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512h388.6c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3z" />
                            </svg>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="card shadow-lg border-0 p-4 p-md-5" style="border-radius: 30px; background-color: white;">
            
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="fw-light text-center">Olá, <span id="display-name" class="fw-bold">Pacheco</span>.</h1>
                </div>
            </div>

            <div class="row align-items-center g-5">
                <div class="col-lg-7 text-center order-1 order-lg-2">
                    <div class="position-relative d-inline-block shadow-lg rounded-4 overflow-hidden border border-5 border-white">
                        <img src="/assets/Images/fundo-avatar01.png" id="img-avatar-bg" class="img-fluid" style="max-height: 550px;">
                        
                        <div class="dropdown">
                            <button class="btn btn-editar-lateral dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                EDITAR
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow">
                                <li><a class="dropdown-item" href="#" onclick="mudarFundo('fundo-avatar01.png')">Cenário 01</a></li>
                                <li><a class="dropdown-item" href="#" onclick="mudarFundo('fundo-avatar02.png')">Cenário 02</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5 order-2 order-lg-1">
                    
                    <div class="row g-3 mb-4 text-center">
                        <div class="col-6">
                            <label class="fw-bold small mb-2 d-block text-muted">Pontuação</label>
                            <div class="p-2 rounded-pill text-white fw-bold shadow-sm btn-acao">3000</div>
                        </div>
                        <div class="col-6">
                            <label class="fw-bold small mb-2 d-block text-muted">Ranking</label>
                            <div class="p-2 rounded-pill text-white fw-bold shadow-sm btn-acao">1º Lugar</div>
                        </div>
                        <div class="col-12 mt-3">
                            <button class="btn btn-acao w-100 rounded-pill py-2 fw-bold text-white shadow-sm">
                                Troque seus pontos
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold small mb-2">Saúde</label>
                        <div class="progress rounded-pill shadow-inset" style="height: 35px;">
                            <div class="progress-bar progress-gold fw-bold" data-target="75" style="width: 0%">0%</div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="fw-bold small mb-2">Odontologia</label>
                        <div class="progress rounded-pill shadow-inset" style="height: 35px;">
                            <div class="progress-bar progress-gold fw-bold" data-target="50" style="width: 0%">0%</div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="fw-bold small mb-2">Estilo de Vida</label>
                        <div class="progress rounded-pill shadow-inset" style="height: 35px;">
                            <div class="progress-bar progress-gold fw-bold" data-target="85" style="width: 0%">0%</div>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button class="btn btn-acao btn-lg rounded-pill fw-bold text-white shadow-sm">Tarefas +</button>
                        <button class="btn btn-acao btn-lg rounded-pill fw-bold text-white shadow-sm">Ranking Global</button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/ranking.js"></script>
</body>
</html>
